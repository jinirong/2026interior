<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인테리어 - 안방</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    
    .container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 900px;
      margin: 0 auto;
    }
    
    h1 {
      color: #333;
      margin-bottom: 30px;
      font-size: 2em;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    h2 {
      color: #667eea;
      margin-top: 30px;
      margin-bottom: 15px;
      font-size: 1.5em;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }
    
    .section {
      margin-bottom: 30px;
    }
    
    .image-container {
      width: 100%;
      max-height: 400px;
      overflow: hidden;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    
    .image-container img {
      width: 100%;
      height: auto;
      object-fit: cover;
    }
    
    ul, ol {
      margin-left: 20px;
      line-height: 1.8;
      color: #555;
    }
    
    li {
      margin-bottom: 10px;
    }
    
    .nested-list {
      margin-left: 20px;
    }
    
    .no-item {
      color: #999;
      font-style: italic;
    }
    
    .back-button {
      display: inline-block;
      margin-top: 30px;
      padding: 10px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: all 0.3s ease;
      font-weight: 500;
    }
    
    .back-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    
    /* 모달 스타일 */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
    }
    
    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .modal-content {
      max-width: 90%;
      max-height: 90%;
      position: relative;
    }
    
    .modal-content img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    
    .close-modal {
      position: absolute;
      top: -40px;
      right: 0;
      font-size: 40px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      user-select: none;
    }
    
    .close-modal:hover {
      color: #ddd;
    }
    
    .images-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    
    @media (max-width: 768px) {
      .images-grid {
        grid-template-columns: 1fr;
      }
    }
    
    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }
      
      h1 {
        font-size: 1.5em;
      }
      
      h2 {
        font-size: 1.2em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏠 안방</h1>

    <div class="section">
      <h2>시안</h2>
      <div id="images-master_room" class="images-grid"></div>
    </div>

    <div class="section">
      <h2>결정사항</h2>
      <ol>
        <li>필름
          <ul class="nested-list">
            <li>키큰장 : 한솔 베이내추럴오크</li>
            <li>거울장 밑 : 베르크그레이</li>
          </ul>
        </li>
      </ol>
    </div>

    <a href="index.html" class="back-button">← 돌아가기</a>
  </div>

  <!-- 모달 -->
  <div id="imageModal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <img id="modalImage" src="" alt="확대 이미지">
    </div>
  </div>

  <script>
    const modal = document.getElementById('imageModal');
    const modalImage = document.getElementById('modalImage');
    const closeModal = document.querySelector('.close-modal');

    function loadImages(folderId, folderPath) {
      const container = document.getElementById(`images-${folderId}`);
      const maxImages = 50;
      const extensions = ['jpg', 'jpeg', 'png', 'bmp'];

      function tryLoadImage(index, extIndex) {
        if (index > maxImages) return;
        if (extIndex >= extensions.length) {
          tryLoadImage(index + 1, 0);
          return;
        }

        const ext = extensions[extIndex];
        const imagePath = `${folderPath}/${folderId}_${index}.${ext}`;
        const img = new Image();
        
        img.onload = function() {
          const imgElement = document.createElement('img');
          imgElement.src = imagePath;
          imgElement.alt = `${folderId} 이미지 ${index}`;
          imgElement.style.width = '100%';
          imgElement.style.height = 'auto';
          imgElement.style.objectFit = 'contain';
          imgElement.style.borderRadius = '10px';
          imgElement.style.cursor = 'pointer';
          
          imgElement.addEventListener('click', function() {
            modal.classList.add('active');
            modalImage.src = imagePath;
          });
          
          container.appendChild(imgElement);
          tryLoadImage(index + 1, 0);
        };

        img.onerror = function() {
          tryLoadImage(index, extIndex + 1);
        };

        img.src = imagePath;
      }

      tryLoadImage(1, 0);
    
    // 체크리스트 초기화
    initChecklist();
    }
    
    // 모달 닫기
    closeModal.addEventListener('click', function() {
      modal.classList.remove('active');
    });

    // 모달 배경 클릭으로 닫기
    modal.addEventListener('click', function(event) {
      if (event.target === modal) {
        modal.classList.remove('active');
      }
    });

    // ESC 키로 닫기
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') {
        modal.classList.remove('active');
      }
    });

    loadImages('master_room', 'images/master_room');
  </script>
</body>
</html>
