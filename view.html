<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 인테리어 - 갤러리</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 30px;
    }
    
    h1 {
      grid-column: 1 / -1;
      color: white;
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5em;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }
    
    .gallery-section {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }
    
    .section-title {
      color: white;
      font-size: 1.5em;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.3);
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }
    
    .images-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .image-card {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
    }
    
    .image-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
    }
    
    .image-card img {
      width: 100%;
      height: 250px;
      object-fit: contain;
      display: block;
      background: #f5f5f5;
      cursor: pointer;
    }
    
    /* 모달 스타일 */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
    }
    
    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .modal-content {
      max-width: 90%;
      max-height: 90%;
      position: relative;
    }
    
    .modal-content img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    
    .close-modal {
      position: absolute;
      top: -40px;
      right: 0;
      font-size: 40px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      user-select: none;
    }
    
    .close-modal:hover {
      color: #ddd;
    }
    
    .back-button {
      display: inline-block;
      margin-top: 40px;
      padding: 12px 30px;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 6px;
      transition: all 0.3s ease;
      font-weight: 600;
      font-size: 1.1em;
    }
    
    .back-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    }
    
    .back-container {
      grid-column: 1 / -1;
      text-align: center;
      margin-top: 60px;
      padding-top: 30px;
      border-top: 2px solid rgba(255, 255, 255, 0.2);
    }
    
    @media (max-width: 768px) {
      h1 {
        font-size: 1.8em;
        margin-bottom: 20px;
      }
      
      .container {
        grid-template-columns: 1fr;
        gap: 20px;
      }
      
      .section-title {
        font-size: 1.2em;
      }
      
      .images-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      }
    }
        font-size: 2em;
      }
      
      .section-title {
        font-size: 1.5em;
      }
      
      .images-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 15px;
      }
      
      .image-card img {
        height: 200px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏠 2026 인테리어</h1>

    <!-- TOP VIEW -->
    <div class="gallery-section">
      <h2 class="section-title">TOP VIEW</h2>
      <div id="images-view" class="images-grid"></div>
    </div>

    <!-- FLOOR -->
    <div class="gallery-section">
      <h2 class="section-title">FLOOR</h2>
      <div id="images-floor-plan" class="images-grid"></div>
    </div>

    <!-- 마루 -->
    <div class="gallery-section">
      <h2 class="section-title">마루</h2>
      <div id="images-floor" class="images-grid"></div>
    </div>

    <!-- 도배 -->
    <div class="gallery-section">
      <h2 class="section-title">도배</h2>
      <div id="images-wallpaper" class="images-grid"></div>
    </div>

    <!-- 현관 -->
    <div class="gallery-section">
      <h2 class="section-title">현관</h2>
      <div id="images-entrance" class="images-grid"></div>
    </div>

    <!-- 주방 -->
    <div class="gallery-section">
      <h2 class="section-title">주방</h2>
      <div id="images-kitchen" class="images-grid"></div>
    </div>

    <!-- 거실 -->
    <div class="gallery-section">
      <h2 class="section-title">거실</h2>
      <div id="images-living_room" class="images-grid"></div>
    </div>

    <!-- 안방 -->
    <div class="gallery-section">
      <h2 class="section-title">안방</h2>
      <div id="images-master_room" class="images-grid"></div>
    </div>

    <!-- 작은방1 -->
    <div class="gallery-section">
      <h2 class="section-title">작은방1</h2>
      <div id="images-small_room1" class="images-grid"></div>
    </div>

    <!-- 작은방2 -->
    <div class="gallery-section">
      <h2 class="section-title">작은방2</h2>
      <div id="images-small_room2" class="images-grid"></div>
    </div>

    <!-- 욕실 -->
    <div class="gallery-section">
      <h2 class="section-title">욕실</h2>
      <div id="images-bathrooms" class="images-grid"></div>
    </div>

    <div class="back-container">
      <a href="index.html" class="back-button">← 홈으로 돌아가기</a>
    </div>
  </div>

  <!-- 모달 -->
  <div id="imageModal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <img id="modalImage" src="" alt="확대 이미지">
    </div>
  </div>

  <script>
    const modal = document.getElementById('imageModal');
    const modalImage = document.getElementById('modalImage');
    const closeModal = document.querySelector('.close-modal');

    function loadGalleryImages(folderId, folderPath, specificFolder = null) {
      const container = document.getElementById(`images-${folderId}`);
      if (!container) return;
      
      const maxImages = 50;
      const actualFolderPath = specificFolder || folderPath;
      const extensions = ['jpg', 'jpeg', 'png', 'bmp'];

      function tryLoadImage(index, extIndex) {
        if (index > maxImages) return;
        if (extIndex >= extensions.length) {
          tryLoadImage(index + 1, 0);
          return;
        }

        const ext = extensions[extIndex];
        const imagePath = `${actualFolderPath}/${folderId}_${index}.${ext}`;
        const img = new Image();
        
        img.onload = function() {
          const card = document.createElement('div');
          card.className = 'image-card';
          
          const imgElement = document.createElement('img');
          imgElement.src = imagePath;
          imgElement.alt = `${folderId} 이미지 ${index}`;
          
          imgElement.addEventListener('click', function() {
            modal.classList.add('active');
            modalImage.src = imagePath;
          });
          
          card.appendChild(imgElement);
          container.appendChild(card);
          tryLoadImage(index + 1, 0);
        };

        img.onerror = function() {
          tryLoadImage(index, extIndex + 1);
        };

        img.src = imagePath;
      }

      tryLoadImage(1, 0);
    }

    // 모달 닫기
    closeModal.addEventListener('click', function() {
      modal.classList.remove('active');
    });

    // 모달 배경 클릭으로 닫기
    modal.addEventListener('click', function(event) {
      if (event.target === modal) {
        modal.classList.remove('active');
      }
    });

    // ESC 키로 닫기
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') {
        modal.classList.remove('active');
      }
    });

    // 각 공간의 이미지 로드
    loadGalleryImages('view', 'images/view');
    loadGalleryImages('floor-plan', 'images/view');
    loadGalleryImages('floor', 'images/view');
    loadGalleryImages('wallpaper', 'images/view');
    loadGalleryImages('film', 'images/view');
    loadGalleryImages('entrance', 'images/view');
    loadGalleryImages('kitchen', 'images/view');
    loadGalleryImages('living_room', 'images/view');
    loadGalleryImages('master_room', 'images/view');
    loadGalleryImages('small_room1', 'images/view');
    loadGalleryImages('small_room2', 'images/view');
    loadGalleryImages('bathrooms', 'images/view');
  </script>
</body>
</html>
