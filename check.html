<!DOCTYPE html>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    
    .container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 900px;
      margin: 0 auto;
    }
    
    h1 {
      color: #333;
      margin-bottom: 30px;
      font-size: 2em;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    h2 {
      color: #667eea;
      margin-top: 40px;
      margin-bottom: 20px;
      font-size: 1.6em;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    h3 {
      color: #764ba2;
      margin-top: 25px;
      margin-bottom: 15px;
      font-size: 1.3em;
    }
    
    .section {
      margin-bottom: 30px;
    }

    .no-item {
      color: #999;
      font-style: italic;
    }

    /* 체크리스트 스타일 */
    .checklist {
      list-style: none;
      margin-left: 0;
      padding-left: 0;
    }

    .checklist li {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      padding: 8px;
      border-radius: 6px;
      transition: background-color 0.2s ease;
    }

    .checklist li:hover {
      background-color: #f5f5f5;
    }

    .checklist-checkbox {
      width: 20px;
      height: 20px;
      margin-right: 12px;
      cursor: pointer;
      accent-color: #667eea;
    }

    .checklist li label {
      cursor: pointer;
      flex: 1;
      color: #555;
      user-select: none;
      transition: all 0.2s ease;
    }

    .checklist li input[type="checkbox"]:checked + label {
      color: #999;
      text-decoration: line-through;
    }

    .back-button {
      display: inline-block;
      margin-top: 30px;
      padding: 10px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: all 0.3s ease;
      font-weight: 500;
    }
    
    .back-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    hr {
      margin: 40px 0;
      border: none;
      border-top: 2px solid #e0e0e0;
    }

    .product-item {
      margin-bottom: 12px;
      padding: 8px;
      border-radius: 6px;
      transition: background-color 0.2s ease;
      display: flex;
      align-items: center;
    }

    .product-item:hover {
      background-color: #f5f5f5;
    }

    .product-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-right: 12px;
      cursor: pointer;
      accent-color: #667eea;
    }

    .product-item label {
      cursor: pointer;
      flex: 1;
      color: #555;
      user-select: none;
      display: flex;
      align-items: center;
    }

    .product-item input[type="checkbox"]:checked + label {
      color: #999;
      text-decoration: line-through;
    }

    .category-label {
      font-size: 0.85em;
      color: #999;
      margin-left: 8px;
      font-style: italic;
    }
    
    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }
      
      h1 {
        font-size: 1.5em;
      }
      
      h2 {
        font-size: 1.3em;
      }

      h3 {
        font-size: 1.1em;
      }
    }
  </style>

    import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    const firebaseConfig = {

      databaseURL: "https://interior-13379-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    window.firebaseDB = database;
  </script>
</head>
<body>

  <script>
    // 동적 구매필요 항목 로드
    const productData = {
      appliances: [
        { id: 'app-냉장고', name: '냉장고' },
        { id: 'app-후드일체형인덕션', name: '후드일체형인덕션' },
        { id: 'app-식기세척기', name: '식기세척기' },
        { id: 'app-로봇청소기', name: '로봇청소기' },
        { id: 'app-음식물처리기', name: '음식물처리기' },
        { id: 'app-정수기', name: '정수기' },
        { id: 'app-욕실환풍기', name: '욕실환풍기' },
        { id: 'app-비데', name: '비데' },
        { id: 'app-전자레인지', name: '전자레인지' },
        { id: 'app-밥솥', name: '밥솥' },
        { id: 'app-오븐겸에어프라이기', name: '오븐겸에어프라이기' },
        { id: 'app-커피머신', name: '커피머신' },
        { id: 'app-커피포트', name: '커피포트' },
        { id: 'app-청소기', name: '청소기' },
        { id: 'app-공기청정기', name: '공기청정기' },
        { id: 'app-세탁기건조기', name: '세탁기, 건조기' },
        { id: 'app-시스템에어컨', name: '시스템에어컨' },
        { id: 'app-에어드레서', name: '에어드레서' },
        { id: 'app-실링팬', name: '실링팬' },
      ],
      materials: [
        { id: 'mat-도어손잡이', name: '도어손잡이' },
        { id: 'mat-양변기', name: '양변기' },
        { id: 'mat-세면기_거실', name: '세면기 (거실)' },
        { id: 'mat-세면대_안방', name: '세면대 (안방)' },
        { id: 'mat-세면수전', name: '세면수전' },
        { id: 'mat-샤워욕조수전_거실', name: '샤워욕조수전 (거실)' },
        { id: 'mat-샤워욕조수전_안방', name: '샤워욕조수전 (안방)' },
        { id: 'mat-슬라이드바', name: '슬라이드바' },
        { id: 'mat-휴지걸이', name: '휴지걸이' },
        { id: 'mat-포인트욕실옷걸이', name: '포인트 욕실옷걸이' },
        { id: 'mat-샤워볼걸이', name: '샤워볼걸이' },
        { id: 'mat-욕실선반', name: '욕실선반' },
        { id: 'mat-수건걸이', name: '수건걸이' },
        { id: 'mat-유가', name: '유가' },
        { id: 'mat-주방수전', name: '주방수전' },
        { id: 'mat-싱크대', name: '싱크대' },
        { id: 'mat-욕조안전바', name: '욕조 안전바' },
        { id: 'mat-방충망', name: '방충망' },
        { id: 'mat-붙박이장_손잡이', name: '붙박이장 손잡이' },
        { id: 'mat-현관장_손잡이', name: '현관장 손잡이' },
        { id: 'mat-폴딩도어_손잡이', name: '폴딩도어 손잡이' },
        { id: 'mat-아일랜드_손잡이', name: '아일랜드 손잡이' },
        { id: 'mat-샤시손잡이', name: '샤시손잡이' },
        { id: 'mat-도어스토퍼', name: '도어스토퍼' },
        { id: 'mat-스위치', name: '스위치' },
        { id: 'mat-콘센트', name: '콘센트' },
        { id: 'mat-방_직부등', name: '방 직부등' },
        { id: 'mat-발코니_직부등', name: '발코니 직부등' },
      ]
    };

    function renderPurchaseList() {
      const section = document.getElementById('purchaseNeededSection');
      const db = window.firebaseDB;
      let html = '';

      // Firebase에서 purchases 데이터 읽어오기
      const purchasesRef = ref(db, 'purchases');
      get(purchasesRef).then(snapshot => {
        const purchasesData = snapshot.val() || {};
        
        // Appliances
        const appliancesChecked = productData.appliances.filter(item => purchasesData[item.id] === true);

        // Materials
        const materialsChecked = productData.materials.filter(item => purchasesData[item.id] === true);

        if (appliancesChecked.length === 0 && materialsChecked.length === 0) {
          section.innerHTML = '<p class="no-item">구매 필요 항목이 없습니다</p>';
          return;
        }

        html = '';

        // Appliances section
        if (appliancesChecked.length > 0) {
          html += '<h3 style="color: #764ba2; margin-top: 0;">가전제품</h3>';
          appliancesChecked.forEach(item => {
            const isCompleted = purchasesData[`completed-${item.id}`] === true;
            const checkedAttr = isCompleted ? 'checked' : '';
            const strikeClass = isCompleted ? 'text-decoration: line-through; color: #999;' : '';
            
            html += `
              <div class="product-item">
                <input type="checkbox" id="completed-${item.id}" class="completion-checkbox" data-product-id="${item.id}" ${checkedAttr}>
                <label for="completed-${item.id}" style="${strikeClass}">${item.name}</label>
              </div>
            `;
          });
        }

        // Materials section
        if (materialsChecked.length > 0) {
          html += '<h3 style="color: #764ba2; margin-top: 20px;">인테리어 자재</h3>';
          materialsChecked.forEach(item => {
            const isCompleted = purchasesData[`completed-${item.id}`] === true;
            const checkedAttr = isCompleted ? 'checked' : '';
            const strikeClass = isCompleted ? 'text-decoration: line-through; color: #999;' : '';
            
            html += `
              <div class="product-item">
                <input type="checkbox" id="completed-${item.id}" class="completion-checkbox" data-product-id="${item.id}" ${checkedAttr}>
                <label for="completed-${item.id}" style="${strikeClass}">${item.name}</label>
              </div>
            `;
          });
        }

        section.innerHTML = html;

        // 체크박스 이벤트 리스너 추가
        document.querySelectorAll('.completion-checkbox').forEach(checkbox => {
          checkbox.addEventListener('change', function() {
            const productId = this.getAttribute('data-product-id');
            const db = window.firebaseDB;
            const completedRef = ref(db, `purchases/completed-${productId}`);
            set(completedRef, this.checked).catch(error => {
              console.error('Firebase 저장 오류:', error);
            });
            renderPurchaseList();
          });
        });
      }).catch(error => {
        console.warn('Firebase 읽기 오류:', error);
      });
    }

    // 체크리스트 기능 (다른 섹션들)
    function initChecklist() {
      const checklistItems = document.querySelectorAll('.checklist-checkbox');
      const db = window.firebaseDB;
      
      checklistItems.forEach(checkbox => {
        const id = checkbox.getAttribute('data-id');
        const checklistRef = ref(db, `checklist/${id}`);
        
        // 초기 상태 불러오기
        get(checklistRef).then(snapshot => {
          if (snapshot.exists()) {
            checkbox.checked = snapshot.val();
          }
        }).catch(error => {
          console.warn('Firebase 읽기 오류:', error);
        });
        
        // 실시간 감시
        onValue(checklistRef, (snapshot) => {
          if (snapshot.exists()) {
            checkbox.checked = snapshot.val();
          }
        });
        
        // 체크박스 변경 시 Firebase에 저장
        checkbox.addEventListener('change', function() {
          const checklistRef = ref(db, `checklist/${id}`);
          set(checklistRef, this.checked).catch(error => {
            console.error('Firebase 저장 오류:', error);
          });
        });
      });
    }

    // 페이지 로드 시 초기화
    document.addEventListener('DOMContentLoaded', () => {
      initChecklist();
      renderPurchaseList();
      
      // Firebase purchases 변경 감시
      const db = window.firebaseDB;
      const purchasesRef = ref(db, 'purchases');
      onValue(purchasesRef, () => {
        renderPurchaseList();
      });
    });
  </script>
</body>
