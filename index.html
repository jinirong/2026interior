<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 인테리어</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 600px;
      width: 100%;
    }
    
    h1 {
      color: #333;
      text-align: center;
      margin-bottom: 10px;
      font-size: 2.5em;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle {
      color: #666;
      text-align: center;
      margin-bottom: 30px;
      font-size: 1.3em;
      font-weight: 600;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.5px;
    }
    
    h2 {
      color: #333;
      text-align: center;
      margin-bottom: 30px;
      font-size: 1.8em;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 10px;
    }
    
    thead {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    th {
      color: white;
      padding: 16px;
      text-align: left;
      font-weight: 600;
      font-size: 1.05em;
    }
    
    td {
      padding: 16px;
      border-bottom: 1px solid #e0e0e0;
      color: #555;
    }
    
    tbody tr {
      transition: all 0.3s ease;
    }
    
    tbody tr:hover {
      background-color: #f5f5f5;
      transform: translateX(5px);
    }
    
    tbody tr:last-child td {
      border-bottom: none;
    }
    
    a {
      display: inline-block;
      padding: 10px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: all 0.3s ease;
      font-weight: 500;
    }
    
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    
    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }
      
      h1 {
        font-size: 1.8em;
        margin-bottom: 8px;
      }
      
      .subtitle {
        font-size: 1.05em;
        margin-bottom: 20px;
      }
      
      th, td {
        padding: 12px;
        font-size: 0.95em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span style="color: #667eea;">🏠</span> 2026 인테리어</h1>
    <p class="subtitle">with 공간한땀</p>


    
    <!-- 일정 사진 섹션 -->
    <div style="text-align: center; margin-bottom: 30px;">
      <img id="scheduleImg" src="images/schedule.png" alt="일정" 
           style="max-width: 200px; cursor: pointer; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: transform 0.3s ease;"
           onmouseover="this.style.transform='scale(1.05)'"
           onmouseout="this.style.transform='scale(1)'">
    </div>
    
    <!-- 모달 팝업 (body 닫기 전에 추가) -->
    <div id="imageModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center;">
      <div style="position: relative;">
        <img src="images/schedule.png" alt="일정 확대" style="max-width: 90vw; max-height: 90vh; border-radius: 10px;">
        <button onclick="closeModal()" style="position: absolute; top: 10px; right: 10px; background: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 24px; font-weight: bold;">×</button>
      </div>
    </div>
    
    <script>
      document.getElementById('scheduleImg').addEventListener('click', function() {
        document.getElementById('imageModal').style.display = 'flex';
      });
      
      function closeModal() {
        document.getElementById('imageModal').style.display = 'none';
      }
      
      // 모달 백그라운드 클릭해도 닫기
      document.getElementById('imageModal').addEventListener('click', function(e) {
        if (e.target === this) {
          closeModal();
        }
      });
    </script>


    <table>
      <thead>
        <tr>
          <th>공간</th>
          <th>링크</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>🏠 전체 VIEW</td>
          <td>
            <a href="view.html">
              DETAILS
            </a>
          </td>
        </tr>
        <tr>
          <td>📝 자재 목록</td>
          <td>
            <a href="interior_materials.html">
              DETAILS
            </a>
          </td>
        </tr>
        <tr>
          <td>📝 가전 목록</td>
          <td>
            <a href="appliances.html">
              DETAILS
            </a>
          </td>
        </tr>
        <tr>
          <td>📝 바닥재 & 마감재</td>
          <td>
            <a href="flooring_finishing.html">
              DETAILS
            </a>
          </td>
        </tr>
        <tr>
          <td>🔌 스위치, 콘센트</td>
          <td>
            <a href="switches_outlets.html">
              DETAILS
            </a>
          </td>
        </tr>
        <tr>
          <td>현관</td>
          <td>
            <a href="entrance.html">
              DETAILS
            </a>
          </td>
        </tr>
        <tr>
          <td>주방</td>
          <td>
            <a href="kitchen.html">
              DETAILS
            </a>
          </td>
        </tr>
        <tr>
          <td>거실</td>
          <td>
            <a href="living_room.html">
              DETAILS
            </a>
          </td>
        </tr>
        <tr>
          <td>안방</td>
          <td>
            <a href="master_room.html">
              DETAILS
            </a>
          </td>
        </tr>
        <tr>
          <td>작은방</td>
          <td>
            <a href="small_rooms.html">
              DETAILS
            </a>
          </td>
        </tr>
        <tr>
          <td>욕실</td>
          <td>
            <a href="bathrooms.html">
              DETAILS
            </a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
